<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新入生歓迎おみくじ</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #d63031; }
        p { font-size: 1.2rem; color: #636e72; }
        .qr-wrapper {
            margin: 30px 0;
            padding: 20px;
            border: 2px dashed #fab1a0;
            display: inline-block;
        }
        .qr-wrapper img {
            width: 300px; /* PCで見やすいサイズ */
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 新入生歓迎おみくじ 🌸</h1>
        <p>スマホでQRコードを読み取って、今日の運勢を占おう！</p>
        <div class="qr-wrapper">
            <img src="qr-code.png" alt="おみくじを引く">
        </div>
        <p>↑ カメラをかざしてね ↑</p>
    </div>
</body>
</html>
